<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply — Submit Your Resume</title>
<style>
    :root {
        --bg: #F0FDFA;
        --bg-secondary: #FFFFFF;
        --card: #FFFFFF;
        --border: #CBD5E1;
        --border-focus: #14B8A6;
        --text: #134E4A;
        --text-secondary: #475569;
        --muted: #64748B;
        --accent: #14B8A6;
        --accent-light: #2DD4BF;
        --accent-hover: #0D9488;
        --accent-glow: rgba(20, 184, 166, 0.18);
        --error: #DC2626;
        --error-bg: rgba(220, 38, 38, 0.08);
        --success: #059669;
        --success-bg: rgba(5, 150, 105, 0.08);
        --radius-sm: 8px;
        --radius: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --shadow: 0 4px 20px rgba(19, 78, 74, 0.1);
        --shadow-lg: 0 12px 40px rgba(19, 78, 74, 0.15);
        --shadow-glow: 0 0 0 4px rgba(20, 184, 166, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    body {
        background: linear-gradient(135deg, #F0FDFA 0%, #ECFEFF 50%, #F0FDFA 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        line-height: 1.5;
    }
    .container { width: 100%; max-width: 560px; }
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 36px 32px 32px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
    }
    .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, #14B8A6, #2DD4BF, #0D9488, #14B8A6);
        background-size: 200% 100%;
        animation: shimmer 4s ease-in-out infinite;
        opacity: 0.85;
    }
    @keyframes shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @media (min-width: 768px) { .card { padding: 44px 40px 40px; } }
    .header { text-align: center; margin-bottom: 28px; }
    .header-icon {
        width: 48px; height: 48px;
        background: linear-gradient(135deg, #14B8A6, #2DD4BF);
        border-radius: var(--radius);
        display: inline-flex; align-items: center; justify-content: center;
        margin-bottom: 14px;
        box-shadow: 0 8px 24px var(--accent-glow);
        animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .header-icon svg { width: 22px; height: 22px; color: #fff; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin: 0 0 4px; color: var(--text); }
    @media (min-width: 768px) { h1 { font-size: 26px; } }
    p.sub { color: var(--text-secondary); margin: 0; font-size: 14px; }
    .form-section-title {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
        color: var(--muted); margin: 22px 0 10px; font-weight: 600;
        display: flex; align-items: center; gap: 8px;
    }
    .form-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; margin-top: 16px; }
    .input-wrapper { position: relative; }
    .input-icon {
        position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
        color: var(--muted); pointer-events: none; display: flex; align-items: center;
    }
    .input-icon svg { width: 16px; height: 16px; }
    input[type="text"], input[type="email"] {
        width: 100%;
        padding: 11px 12px 11px 38px;
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
        transition: all 0.25s;
        appearance: none;
        -webkit-appearance: none;
    }
    input[type="text"]:focus, input[type="email"]:focus {
        outline: none; border-color: var(--border-focus); box-shadow: var(--shadow-glow); background: #FFFFFF;
    }
    .input-wrapper:focus-within .input-icon { color: var(--accent); }
    input::placeholder { color: #94A3B8; opacity: 1; }
    #dropZone {
        margin-top: 16px;
        border: 2px dashed var(--border);
        border-radius: var(--radius-lg);
        padding: 30px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.25s;
        background: var(--bg);
        min-height: 120px;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    }
    #dropZone:hover { border-color: #64748B; background: #F0FDFA; }
    #dropZone.dragover {
        border-color: var(--accent); background: rgba(20, 184, 166, 0.06);
        box-shadow: 0 0 0 8px rgba(20, 184, 166, 0.04); transform: scale(1.01);
    }
    #dropZone.has-file { border-style: solid; border-color: var(--success); background: rgba(5, 150, 105, 0.04); }
    #dropZone p { margin: 0; color: var(--text-secondary); font-size: 14px; pointer-events: none; }
    #dropZone .drop-hint { font-size: 12px; color: var(--muted); pointer-events: none; }
    #dropZone .filename {
        color: var(--text); font-weight: 600; margin-top: 2px; font-size: 14px; pointer-events: none;
        word-break: break-all; max-width: 100%;
        background: rgba(5, 150, 105, 0.12); padding: 4px 12px; border-radius: 20px; display: inline-block;
    }
    .drop-icon {
        width: 40px; height: 40px; border-radius: 50%;
        background: rgba(20, 184, 166, 0.12);
        display: flex; align-items: center; justify-content: center;
        transition: all 0.25s; pointer-events: none;
    }
    #dropZone.dragover .drop-icon { background: rgba(20, 184, 166, 0.22); transform: scale(1.1); }
    #dropZone.has-file .drop-icon { background: rgba(5, 150, 105, 0.18); }
    .drop-icon svg { width: 20px; height: 20px; color: var(--accent); }
    #dropZone.has-file .drop-icon svg { color: var(--success); }
    input[type="file"] { position: absolute; width: 1px; height: 1px; opacity: 0; }
    .remove-file-btn {
        display: none; margin-top: 8px; font-size: 12px; color: var(--error);
        cursor: pointer; background: none; border: none; text-decoration: underline; padding: 4px 8px;
    }
    .remove-file-btn:hover { background: rgba(220, 38, 38, 0.1); }
    .remove-file-btn.visible { display: inline-block; }
    .progress-wrap { margin-top: 14px; height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; display: none; }
    .progress-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #14B8A6, #2DD4BF);
        border-radius: 10px; transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 10px rgba(20, 184, 166, 0.55);
    }
    .status {
        margin-top: 14px; font-size: 13px; padding: 11px 14px; border-radius: var(--radius);
        display: none; align-items: flex-start; gap: 8px; line-height: 1.4;
    }
    .status.error { display: flex; background: var(--error-bg); color: #991B1B; border: 1px solid rgba(220, 38, 38, 0.25); }
    .status.success { display: flex; background: var(--success-bg); color: #065F46; border: 1px solid rgba(5, 150, 105, 0.25); }
    .status.info { display: flex; background: rgba(20, 184, 166, 0.08); color: #0F766E; border: 1px solid rgba(20, 184, 166, 0.25); }
    .status-icon { flex-shrink: 0; margin-top: 1px; }
    .status-icon svg { width: 16px; height: 16px; }
    .btn-wrapper { margin-top: 26px; }
    button {
        width: 100%; padding: 13px 20px;
        background: linear-gradient(135deg, #14B8A6, #2DD4BF);
        color: #fff; border: none; border-radius: var(--radius);
        font-size: 15px; font-weight: 600; cursor: pointer;
        transition: all 0.25s; position: relative; overflow: hidden; font-family: inherit;
        box-shadow: 0 4px 16px rgba(20, 184, 166, 0.35);
    }
    button:hover:not(:disabled) { background: linear-gradient(135deg, #0D9488, #2DD4BF); box-shadow: 0 6px 24px rgba(20, 184, 166, 0.5); transform: translateY(-1px); }
    button:active:not(:disabled) { transform: scale(0.97); transition: all 0.1s ease; }
    button:disabled { background: #CBD5E1; cursor: not-allowed; color: #94A3B8; box-shadow: none; transform: none; }
    button.loading { color: transparent; pointer-events: none; }
    button.loading::before {
        content: ''; position: absolute; top: 50%; left: 50%;
        width: 20px; height: 20px;
        border: 2.5px solid rgba(255, 255, 255, 0.3); border-top-color: #fff;
        border-radius: 50%; animation: spin 0.7s linear infinite;
        transform: translate(-50%, -50%);
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    .toast {
        position: fixed; bottom: 24px; left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #FFFFFF; border: 1px solid var(--border); border-radius: var(--radius-lg);
        padding: 12px 20px; font-size: 13px; color: var(--text); z-index: 1000;
        box-shadow: var(--shadow-lg); transition: transform 0.25s; pointer-events: none;
        text-align: center; max-width: 90vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(5, 150, 105, 0.6); background: #F0FDF4; }
    .toast.error { border-color: rgba(220, 38, 38, 0.6); background: #FEF2F2; }
    @media (max-width: 480px) {
        body { padding: 10px; align-items: flex-start; padding-top: 30px; }
        .card { padding: 24px 18px 22px; border-radius: var(--radius-lg); }
        h1 { font-size: 20px; }
        #dropZone { padding: 22px 14px; min-height: 100px; }
        input[type="text"], input[type="email"] { padding: 10px 10px 10px 34px; font-size: 13px; }
        button { padding: 12px 16px; font-size: 14px; }
    }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div class="header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
            </div>
            <h1>Submit Your Resume</h1>
            <p class="sub">Upload your CV — we accept PDF or Word (.docx) files</p>
        </div>

        <div class="form-section-title">Job Reference</div>

        <label for="orgCode">Organization Code</label>
        <div class="input-wrapper">
            <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </span>
            <input type="text" id="orgCode" placeholder="e.g. ACME24" maxlength="20" autocomplete="off">
        </div>

        <label for="jobId">Job Opening ID</label>
        <div class="input-wrapper">
            <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            </span>
            <input type="text" id="jobId" placeholder="e.g. SENIOR_DEV" maxlength="30" autocomplete="off">
        </div>

        <div class="form-section-title">Personal Information</div>

        <label for="fullName">Full Name</label>
        <div class="input-wrapper">
            <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="fullName" placeholder="Jane Doe" autocomplete="name">
        </div>

        <label for="email">Email</label>
        <div class="input-wrapper">
            <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" placeholder="jane@example.com" autocomplete="email">
        </div>

        <div class="form-section-title">Resume Upload</div>

        <label>Resume File</label>
        <div id="dropZone" tabindex="0" role="button" aria-label="Upload resume file">
            <div class="drop-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <p>Click to browse or drag your file here</p>
            <p class="drop-hint">PDF or .docx only, max 10MB</p>
            <span class="filename" id="filenameDisplay"></span>
        </div>
        <input type="file" id="fileInput" accept=".pdf,.docx">
        <button class="remove-file-btn" id="removeFileBtn" type="button">✕ Remove file</button>

        <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="status" id="status" aria-live="polite">
            <span class="status-icon" id="statusIcon"></span>
            <span id="statusText"></span>
        </div>

        <div class="btn-wrapper">
            <button id="submitBtn" disabled>Select a file to continue</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.0/mammoth.browser.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, increment, getDoc } from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAE8ayosjQT6rVjWSyF_-4fp80tWqqgchM",
    authDomain: "ai-resume-screener-df66d.firebaseapp.com",
    projectId: "ai-resume-screener-df66d",
    storageBucket: "ai-resume-screener-df66d.firebasestorage.app",
    messagingSenderId: "546771929700",
    appId: "1:546771929700:web:4abe05a890fef4e8d02d71"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const PDFJS_VERSION = "6.1.200";
let _pdfjsLib = null;
async function getPdfjsLib() {
    if (_pdfjsLib) return _pdfjsLib;
    _pdfjsLib = await import(`https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VERSION}/pdf.min.mjs`);
    _pdfjsLib.GlobalWorkerOptions.workerSrc =
        `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VERSION}/pdf.worker.min.mjs`;
    return _pdfjsLib;
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const filenameDisplay = document.getElementById('filenameDisplay');
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');
const statusIcon = document.getElementById('statusIcon');
const statusText = document.getElementById('statusText');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const removeFileBtn = document.getElementById('removeFileBtn');
const toast = document.getElementById('toast');
const orgCodeInput = document.getElementById('orgCode');
const jobIdInput = document.getElementById('jobId');

let selectedFile = null;
let extractedText = null;
const MAX_SIZE_BYTES = 10 * 1024 * 1024;
const MAX_RESUME_TEXT_CHARS = 15000;
let toastTimer = null;

function showToast(message, type = '') {
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = message;
    toast.className = 'toast ' + type + ' show';
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

const statusIconsSVG = {
    error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="9 12 12 15 16 9"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
};

function showStatus(message, type) {
    statusText.textContent = message;
    statusIcon.innerHTML = statusIconsSVG[type] || statusIconsSVG.info;
    statusEl.className = 'status ' + type;
    statusEl.style.display = 'flex';
}
function clearStatus() {
    statusEl.className = 'status';
    statusEl.style.display = 'none';
    statusText.textContent = '';
    statusIcon.innerHTML = '';
}
function setProgress(pct) {
    if (pct > 0 && pct < 100) {
        progressWrap.style.display = 'block';
        progressBar.style.width = pct + '%';
    } else if (pct >= 100) {
        progressBar.style.width = '100%';
        setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 500);
    } else {
        progressWrap.style.display = 'none';
        progressBar.style.width = '0%';
    }
}
function updateDropZoneUI(hasFile) {
    const mainP = dropZone.querySelector('p');
    const hintP = dropZone.querySelector('.drop-hint');
    if (hasFile) {
        dropZone.classList.add('has-file');
        if (mainP) mainP.textContent = 'File selected';
        if (hintP) hintP.textContent = 'Click or drop to replace';
        removeFileBtn.classList.add('visible');
    } else {
        dropZone.classList.remove('has-file');
        if (mainP) mainP.textContent = 'Click to browse or drag your file here';
        if (hintP) hintP.textContent = 'PDF or .docx only, max 10MB';
        removeFileBtn.classList.remove('visible');
    }
}
function resetFileState() {
    selectedFile = null;
    extractedText = null;
    filenameDisplay.textContent = '';
    fileInput.value = '';
    updateDropZoneUI(false);
    clearStatus();
    setProgress(0);
    submitBtn.disabled = true;
    submitBtn.textContent = 'Select a file to continue';
    submitBtn.classList.remove('loading');
}

dropZone.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
});
dropZone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
});
removeFileBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    e.preventDefault();
    resetFileState();
    showToast('File removed', '');
});

async function handleFile(file) {
    clearStatus();
    extractedText = null;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Select a file to continue';
    submitBtn.classList.remove('loading');

    const nameLower = file.name.toLowerCase();
    const isPdf = nameLower.endsWith('.pdf');
    const isDocx = nameLower.endsWith('.docx');
    const isLegacyDoc = nameLower.endsWith('.doc') && !isDocx;

    if (isLegacyDoc) {
        showStatus("We can't read old .doc files. Please re-save as PDF or .docx and upload again.", 'error');
        updateDropZoneUI(false);
        filenameDisplay.textContent = '';
        showToast('Unsupported: old .doc format', 'error');
        return;
    }
    if (!isPdf && !isDocx) {
        showStatus('Unsupported file type. Please upload a PDF or .docx file.', 'error');
        updateDropZoneUI(false);
        filenameDisplay.textContent = '';
        showToast('Unsupported file type', 'error');
        return;
    }
    if (file.size > MAX_SIZE_BYTES) {
        showStatus('File is too large. Please keep your resume under 10MB.', 'error');
        updateDropZoneUI(false);
        filenameDisplay.textContent = '';
        showToast('File exceeds 10MB limit', 'error');
        return;
    }

    selectedFile = file;
    filenameDisplay.textContent = file.name;
    updateDropZoneUI(true);
    showStatus('Reading and extracting text…', 'info');
    submitBtn.textContent = 'Processing…';
    submitBtn.classList.add('loading');

    try {
        setProgress(25);
        const rawText = isPdf ? await extractPdfText(file) : await extractDocxText(file);
        setProgress(75);

        const cleaned = cleanTextForAts(rawText);
        if (!cleaned || cleaned.trim().length < 40) {
            showStatus('Could not find readable text. If this is a scanned image, please upload a text-based PDF or Word document.', 'error');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Select a file to continue';
            submitBtn.classList.remove('loading');
            setProgress(0);
            updateDropZoneUI(false);
            filenameDisplay.textContent = '';
            showToast('No readable text found', 'error');
            return;
        }

        extractedText = cleaned.length > MAX_RESUME_TEXT_CHARS
            ? cleaned.slice(0, MAX_RESUME_TEXT_CHARS)
            : cleaned;

        setProgress(100);
        showStatus('✅ Resume text extracted successfully. Ready to submit.', 'success');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
        submitBtn.classList.remove('loading');
        showToast('Resume ready!', 'success');
    } catch (err) {
        console.error('File processing error:', err);
        const friendly = isPdf
            ? 'Could not read this PDF. It may be corrupted, password-protected, or scanned images only.'
            : 'Could not read this Word document. It may be corrupted or in an unsupported format.';
        showStatus(friendly, 'error');
        submitBtn.textContent = 'Select a file to continue';
        submitBtn.classList.remove('loading');
        setProgress(0);
        updateDropZoneUI(false);
        filenameDisplay.textContent = '';
        showToast('Error reading file', 'error');
    }
}

async function extractPdfText(file) {
    const pdfjsLib = await getPdfjsLib();
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const content = await page.getTextContent();

        const Y_TOLERANCE = 3;
        const lineGroups = [];

        for (const item of content.items) {
            const y = item.transform[5];
            const x = item.transform[4];
            let group = lineGroups.find(g => Math.abs(g.y - y) <= Y_TOLERANCE);
            if (!group) {
                group = { y, items: [] };
                lineGroups.push(group);
            }
            group.items.push({ x, str: item.str });
        }

        lineGroups.sort((a, b) => b.y - a.y);
        const lines = lineGroups.map(g =>
            g.items.sort((a, b) => a.x - b.x).map(i => i.str).join(' ')
        );

        fullText += lines.join('\n') + '\n\n';
    }

    return fullText;
}

async function extractDocxText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    return result.value;
}

function cleanTextForAts(raw) {
    if (!raw) return '';
    return raw
        .replace(/\r\n/g, '\n')
        .replace(/\u00A0/g, ' ')
        .replace(/[ \t]+/g, ' ')
        .replace(/\n{3,}/g, '\n\n')
        .split('\n').map(l => l.trim()).join('\n').trim();
}

function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

submitBtn.addEventListener('click', async () => {
    const orgCode = orgCodeInput.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '_');
    const jobId = jobIdInput.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '_');
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();

    if (!orgCode || orgCode.length < 3) {
        showStatus('Please enter a valid Organization Code (at least 3 characters).', 'error');
        showToast('Missing/invalid Organization Code', 'error'); return;
    }
    if (!jobId || jobId.length < 2) {
        showStatus('Please enter the Job Opening ID from HR.', 'error');
        showToast('Missing Job Opening ID', 'error'); return;
    }
    if (!fullName) {
        showStatus('Please enter your full name.', 'error');
        showToast('Missing full name', 'error'); return;
    }
    if (!isValidEmail(email)) {
        showStatus('Please enter a valid email address.', 'error');
        showToast('Invalid email address', 'error'); return;
    }
    if (!extractedText) {
        showStatus('Please upload a resume first.', 'error');
        showToast('No resume uploaded', 'error'); return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';
    submitBtn.classList.add('loading');
    showStatus('Submitting your application…', 'info');

    try {
        try {
            await signInAnonymously(auth);
        } catch (authErr) {
            throw new Error('Could not connect securely. Please check your internet connection and try again.');
        }

        let jobSnap;
        try {
            const jobRef = doc(db, "organizations", orgCode, "job_openings", jobId);
            jobSnap = await getDoc(jobRef);
        } catch (readErr) {
            throw new Error('Could not verify the job posting right now. Please try again shortly.');
        }

        if (!jobSnap.exists()) {
            throw new Error(`Job "${jobId}" not found in organization "${orgCode}". Please verify with HR.`);
        }

        try {
            await addDoc(collection(db, "organizations", orgCode, "job_openings", jobId, "candidates"), {
                fileName: selectedFile.name,
                orgId: orgCode,
                jobId: jobId,
                name: fullName,
                email: email,
                resumeText: extractedText,
                status: "pending",
                score: 0,
                uploadedAt: new Date().toISOString()
            });
            await updateDoc(doc(db, "organizations", orgCode, "job_openings", jobId), { cvCount: increment(1) });
        } catch (writeErr) {
            throw new Error('Could not submit your application. Please try again.');
        }

        showStatus('✅ Application submitted successfully. Good luck!', 'success');
        submitBtn.textContent = 'Submitted ✓';
        submitBtn.classList.remove('loading');
        showToast('Application submitted! 🎉', 'success');

        setTimeout(() => {
            document.querySelectorAll('input[type="text"], input[type="email"]').forEach(i => i.value = '');
            resetFileState();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submit Another Application';
            submitBtn.classList.remove('loading');
            clearStatus();
        }, 3500);
    } catch (err) {
        console.error(err);
        showStatus('❌ ' + (err.message || 'Submission failed. Please try again.'), 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
        submitBtn.classList.remove('loading');
        showToast(err.message || 'Submission failed', 'error');
    }
});

updateDropZoneUI(false);
</script>
